name: ARC Runner Proof

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

jobs:
  harmless-runner-proof:
    name: harmless-runner-proof
    runs-on: arc-ainulindale-api
    timeout-minutes: 5

    steps:
      - name: Prove this job landed on the ARC runner
        shell: bash
        run: |
          set -euo pipefail

          echo "hostname=$(hostname)"
          echo "whoami=$(whoami)"
          echo "RUNNER_NAME=${RUNNER_NAME:-}"
          echo "RUNNER_OS=${RUNNER_OS:-}"
          echo "RUNNER_ARCH=${RUNNER_ARCH:-}"
          echo "RUNNER_ENVIRONMENT=${RUNNER_ENVIRONMENT:-}"
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-}"
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME:-}"
          echo "GITHUB_REF=${GITHUB_REF:-}"
          echo "GITHUB_BASE_REF=${GITHUB_BASE_REF:-}"
          echo "GITHUB_HEAD_REF=${GITHUB_HEAD_REF:-}"

          test "${RUNNER_ENVIRONMENT:-}" = "self-hosted"
          test "${RUNNER_OS:-}" = "Linux"
          test "${GITHUB_EVENT_NAME:-}" = "pull_request"

          echo "ARC harmless workflow completed."
